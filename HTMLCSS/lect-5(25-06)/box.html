<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .row{
            border: 5px solid black;
            padding: 50px 100px;
        }
        .col{
            height: 100px;
            width: 200px;
            border:  2px solid blue;
            display: inline-block;
        }
        nav{
            background-color: black;
            color: white;
            padding: 30px 100px;
        }
        ul li{
            display: inline-block;
            padding: 0px 20px;
            font-size: 1.5em;
        }
        li:Hover{
            background-color: red;
        }
        ul li a{
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
   <div class="row">
       <div class="col">1</div>
       <div class="col">2</div>
       <div class="col">3</div>
       <div class="col">4</div>
   </div>
   <nav>
       <ul>
           <li><a href="">Home</a></li>
           <li><a href="">Gallary</a></li>
           <li><a href="">About</a></li>
           <li><a href="">Contact</a></li>
           <li><a href="">Team</a></li>
       </ul>
   </nav>
</body>
</html>
