<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
        }
        .row{
            border: 5px solid black;
            height: 500px;
            display: flex;
            flex-direction: row;
            /* flex-wrap: wrap-reverse; */
            justify-content: center;
            gap: 20px;
            align-items: center;
        }
        .col{
            height: 100px;
            width: 200px;
            border:  2px solid blue;
           
        }
        /* #col-1{
            flex-grow: 2;
        }
        #col-2{
            flex-shrink: 2;
        } */
         #col-1{
            flex-basis: 400px;
         }
         .col:nth-child(even){
            align-self: flex-end;
         }
        nav{
            background-color: rgba(0,0,0,0.5);
            padding: 0px 100px;
            display: flex;
            height: 80px;
            justify-content: space-between;
            align-items: center;
        }
        ul{
            display: flex;
        }
        li{
            list-style: none;
            padding: 0px 20px;
        }
      
    </style>
</head>
<body>
     <nav>
        <div class="logo-div">
            <label for="">Feliciano</label>
        </div>
       <ul>
           <li><a href="">Home</a></li>
           <li><a href="">Gallary</a></li>
           <li><a href="">About</a></li>
           <li><a href="">Contact</a></li>
           <li><a href="">Team</a></li>
       </ul>
   </nav>
   <div class="row">
     <div class="col" id="col-1">1</div>
     <div class="col" id="col-2">2</div>
     <div class="col" id="col-3">3</div>
     <div class="col" id="col-4">4</div>
   </div>
    
</body>
</html>
