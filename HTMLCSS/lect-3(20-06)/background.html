<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            height: 900px;
            width: 100%;
            border: 1px solid black;
            background-image: url(back.jpeg);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            background-attachment: fixed;
            /* background-position: center; */
        }
        .linear{
            margin-top: 20px;
            border: 1px solid black;
            height: 400px;
            width: 100%;
            background: linear-gradient(to right,blue,rgb(126, 126, 157));
        }
         .radial{
            margin-top: 20px;
            border: 1px solid black;
            height: 400px;
            width: 100%;
            background: radial-gradient(blue,rgb(126, 126, 157));
        }
         .conic{
            margin-top: 20px;
            border: 1px solid black;
            height: 400px;
            width: 50%;
            background: conic-gradient(blue,rgb(126, 126, 157));
        }
    </style>
</head>
<body>
    <div class="main"></div>
    <div class="linear">

    </div>
     <div class="radial">

    </div>
    <div class="conic"></div>
</body>
</html>
