<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3em;
            color: brown;
            font-weight:bolder;
            text-shadow: -3px -3px 4px gray;
            text-transform: lowercase;
            
        }
         h2{
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 3em;
            color: brown;
            font-weight:bolder;
            -webkit-text-stroke-width: 1px;
            -webkit-text-stroke-color: black;
               
        }
        p{
            text-indent: 100px;
        }
    </style>
</head>
<body>
    <h1>Welcome to app</h1>
    <h2>Text-indent example</h2>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea eaque, voluptates neque nesciunt quia voluptatum ut illo, eveniet totam nulla quibusdam tempore cupiditate modi ab minima magnam maxime deserunt libero?</p>
</body>
</html>
