<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            position: relative;
            
            border:1px solid black; 
        }
        .in-1{
            height: 100px;
            width: 100px;
            background-color: red;
            position:absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .in-1:hover{
            transform: translate(100px,100px);
            transition: transform 2s ease;
        }
         .in-2{
            height: 100px;
            width: 100px;
            background-color: red;
            position:absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="in-1">1</div>
        <div class="in-2">2</div>
    </div>
</body>
</html>
