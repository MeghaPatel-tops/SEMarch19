<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            border: 2px solid black;
            padding: 50px;
            display:grid;
            grid-template-columns: repeat(4,1fr);
            /* row-gap: 10px;
            column-gap: 20px; */
            gap:20px;

        }
        .box{
            padding: 50px;
            border: 3px solid blue;
        }
        #box-1{
            grid-row: 1 / 3 span;
        }
        #box-2{
            grid-column: 2 / 2 span;
        }
        #box-6{
            grid-column: 4 / 1 span;
            grid-row: 2 / 2 span;
        }
    </style>
</head>
<body>
    <div class="main">
       <div class="box" id="box-1">1</div>
       <div class="box" id="box-2">2</div>
       <div class="box" id="box-3">3</div>
       <div class="box" id="box-4">4</div>
       <div class="box" id="box-5">5</div>
       <div class="box" id="box-6">6</div>
       <div class="box" id="box-7">7</div>
       <div class="box" id="box-8">8</div>
     
    </div>
</body>
</html>
